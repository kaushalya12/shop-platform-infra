apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: dev

spec:
  template:
    metadata:
       labels:
         app: nginx-test
    spec:
      containers:
          - name: nginx
            image: nginx
            ports:
             - containerPort: 80
  
  replicas: 1
  selector:
     matchLabels:
       app: nginx-test
